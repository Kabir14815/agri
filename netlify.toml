# Netlify: build the Vite app from /frontend and publish /frontend/dist
# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Domains: agriit.netlify.app, kgffarmingindia.com, www.kgffarmingindia.com
# Required env var in Netlify UI (Site settings → Environment variables):
#   VITE_API_URL = https://agri-n5jz.onrender.com/api

[build]
  # `publish` is relative to `base`, not the repo root — see Netlify docs.
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  # Change agri to your Render service name after backend is live
  VITE_API_URL = "https://agri-n5jz.onrender.com/api"

# React Router (SPA): serve index.html for all paths so /admin, /blog/1, etc. work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
