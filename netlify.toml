# Netlify: build the Vite app from /frontend and publish /frontend/dist
# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Domains: agriit.netlify.app, kgffarmingindia.com, www.kgffarmingindia.com
# Required env var in Netlify UI (Site settings → Environment variables):
#   VITE_API_URL = https://agri-n5jz.onrender.com/api

[build]
  # `publish` is relative to `base`, not the repo root — see Netlify docs.
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  # Use same-origin /api (proxied to Render below) — avoids CORS and "Failed to fetch"
  VITE_API_URL = "/api"

# Proxy API requests to Render (must be BEFORE the SPA catch-all)
[[redirects]]
  from = "/api/*"
  to = "https://agri-n5jz.onrender.com/api/:splat"
  status = 200
  force = true

# React Router (SPA): serve index.html for all other paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
