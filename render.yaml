# One-click Render deploy — connect GitHub repo, paste secrets when asked.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agri
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: kgf_farming
      - key: AUTH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrator
      - key: CORS_ORIGINS
        value: https://kgffarmingindia.com,https://www.kgffarmingindia.com,https://agriit.netlify.app,http://localhost:5173,http://127.0.0.1:5173
