# One-click Render deploy — connect GitHub repo, paste MongoDB URI when asked.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agri
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: kgf_farming
      - key: CORS_ORIGINS
        value: https://agriit.netlify.app,http://localhost:5173,http://127.0.0.1:5173
